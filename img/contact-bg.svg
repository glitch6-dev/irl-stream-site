<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 460" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ctSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#010207"/>
      <stop offset="55%"  stop-color="#030d1a"/>
      <stop offset="100%" stop-color="#050b14"/>
    </linearGradient>
    <radialGradient id="ctMintGlow" cx="50%" cy="60%" r="55%">
      <stop offset="0%"   stop-color="#00FFAA" stop-opacity="0.22"/>
      <stop offset="50%"  stop-color="#00FFAA" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00FFAA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ctRChan" cx="30%" cy="55%" r="42%">
      <stop offset="0%"   stop-color="#FF003C" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FF003C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ctBChan" cx="70%" cy="55%" r="42%">
      <stop offset="0%"   stop-color="#0055FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0055FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="ctScan" x="0" y="0" width="1440" height="4" patternUnits="userSpaceOnUse">
      <rect width="1440" height="1" fill="#000" fill-opacity="0.16"/>
    </pattern>
  </defs>

  <!-- Sky -->
  <rect width="1440" height="460" fill="url(#ctSky)"/>

  <!-- Stars — white -->
  <circle cx="62"   cy="34"  r="0.8" fill="#fff" opacity="0.65"/>
  <circle cx="158"  cy="20"  r="1.0" fill="#fff" opacity="0.52"/>
  <circle cx="248"  cy="56"  r="0.6" fill="#fff" opacity="0.46"/>
  <circle cx="334"  cy="12"  r="0.9" fill="#fff" opacity="0.60"/>
  <circle cx="438"  cy="42"  r="0.7" fill="#fff" opacity="0.38"/>
  <circle cx="114"  cy="88"  r="0.6" fill="#fff" opacity="0.36"/>
  <circle cx="298"  cy="72"  r="0.7" fill="#fff" opacity="0.34"/>
  <!-- right side stars away from rings -->
  <circle cx="1020" cy="38"  r="0.8" fill="#fff" opacity="0.58"/>
  <circle cx="1108" cy="18"  r="1.0" fill="#fff" opacity="0.50"/>
  <circle cx="1196" cy="52"  r="0.7" fill="#fff" opacity="0.44"/>
  <circle cx="1284" cy="24"  r="0.9" fill="#fff" opacity="0.60"/>
  <circle cx="1368" cy="46"  r="0.8" fill="#fff" opacity="0.48"/>
  <circle cx="1052" cy="86"  r="0.6" fill="#fff" opacity="0.36"/>
  <circle cx="1240" cy="70"  r="0.8" fill="#fff" opacity="0.42"/>
  <circle cx="1398" cy="78"  r="0.6" fill="#fff" opacity="0.36"/>
  <!-- top center sparse -->
  <circle cx="680"  cy="14"  r="0.8" fill="#fff" opacity="0.50"/>
  <circle cx="760"  cy="30"  r="0.6" fill="#fff" opacity="0.44"/>

  <!-- Stars — Glitch Mint -->
  <circle cx="182"  cy="28"  r="1.1" fill="#00FFAA" opacity="0.80"/>
  <circle cx="372"  cy="16"  r="0.9" fill="#00FFAA" opacity="0.70"/>
  <circle cx="1060" cy="32"  r="1.0" fill="#00FFAA" opacity="0.72"/>
  <circle cx="1320" cy="20"  r="1.2" fill="#00FFAA" opacity="0.62"/>
  <circle cx="152"  cy="62"  r="0.8" fill="#00FFAA" opacity="0.50"/>
  <circle cx="1188" cy="60"  r="0.8" fill="#00FFAA" opacity="0.48"/>

  <!-- Atmospheric glows -->
  <rect width="1440" height="460" fill="url(#ctRChan)"/>
  <rect width="1440" height="460" fill="url(#ctBChan)"/>

  <!-- Signal rings centered at (720, 260) -->
  <!-- Outermost rings — very faint -->
  <circle cx="720" cy="260" r="380" fill="none" stroke="#00FFAA" stroke-width="0.4" opacity="0.06"/>
  <circle cx="720" cy="260" r="340" fill="none" stroke="#00FFAA" stroke-width="0.4" opacity="0.08"/>
  <circle cx="720" cy="260" r="300" fill="none" stroke="#00FFAA" stroke-width="0.5" opacity="0.10"/>
  <circle cx="720" cy="260" r="260" fill="none" stroke="#00FFAA" stroke-width="0.5" opacity="0.13"/>
  <circle cx="720" cy="260" r="220" fill="none" stroke="#00FFAA" stroke-width="0.6" opacity="0.16"/>
  <circle cx="720" cy="260" r="180" fill="none" stroke="#00FFAA" stroke-width="0.6" opacity="0.20"/>
  <circle cx="720" cy="260" r="140" fill="none" stroke="#00FFAA" stroke-width="0.7" opacity="0.24"/>
  <circle cx="720" cy="260" r="100" fill="none" stroke="#00FFAA" stroke-width="0.8" opacity="0.30"/>
  <circle cx="720" cy="260" r="62"  fill="none" stroke="#00FFAA" stroke-width="1.0" opacity="0.38"/>
  <circle cx="720" cy="260" r="30"  fill="none" stroke="#00FFAA" stroke-width="1.2" opacity="0.48"/>

  <!-- RGB split on two mid rings -->
  <circle cx="720" cy="260" r="182" fill="none" stroke="#FF003C" stroke-width="0.4" opacity="0.18"/>
  <circle cx="720" cy="260" r="178" fill="none" stroke="#0055FF" stroke-width="0.4" opacity="0.16"/>
  <circle cx="720" cy="260" r="142" fill="none" stroke="#FF003C" stroke-width="0.3" opacity="0.14"/>
  <circle cx="720" cy="260" r="138" fill="none" stroke="#0055FF" stroke-width="0.3" opacity="0.12"/>

  <!-- Center dot -->
  <circle cx="720" cy="260" r="4"   fill="#00FFAA" opacity="0.70"/>
  <circle cx="720" cy="260" r="2"   fill="#fff"    opacity="0.90"/>

  <!-- Cross-hair lines through center (very faint) -->
  <line x1="720" y1="0"   x2="720" y2="460" stroke="#00FFAA" stroke-width="0.3" opacity="0.07"/>
  <line x1="0"   y1="260" x2="1440" y2="260" stroke="#00FFAA" stroke-width="0.3" opacity="0.07"/>

  <!-- Glitch pixel artifacts -->
  <rect x="88"   y="150" width="140" height="2" fill="#00FFAA" fill-opacity="0.38"/>
  <rect x="414"  y="148" width="70"  height="1" fill="#FF003C" fill-opacity="0.48"/>
  <rect x="1098" y="149" width="84"  height="1" fill="#00FFAA" fill-opacity="0.44"/>
  <rect x="1292" y="152" width="56"  height="2" fill="#FF003C" fill-opacity="0.34"/>
  <rect x="206"  y="218" width="88"  height="2" fill="#FF003C" fill-opacity="0.34"/>
  <rect x="1204" y="215" width="96"  height="1" fill="#FF003C" fill-opacity="0.32"/>

  <!-- Dead pixel anchors -->
  <rect x="88"   y="150" width="3" height="3" fill="#00FFAA" fill-opacity="0.95"/>
  <rect x="415"  y="148" width="2" height="4" fill="#FF003C" fill-opacity="1.00"/>
  <rect x="1099" y="149" width="2" height="3" fill="#00FFAA" fill-opacity="1.00"/>
  <rect x="207"  y="218" width="3" height="3" fill="#FF003C" fill-opacity="0.88"/>
  <rect x="1205" y="215" width="3" height="3" fill="#FF003C" fill-opacity="0.84"/>

  <!-- TV interference lines -->
  <rect x="0" y="136" width="1440" height="1" fill="#00FFAA" fill-opacity="0.06"/>
  <rect x="0" y="228" width="1440" height="1" fill="#FF003C" fill-opacity="0.07"/>
  <rect x="0" y="316" width="1440" height="1" fill="#0055FF" fill-opacity="0.08"/>
  <rect x="0" y="402" width="1440" height="1" fill="#00FFAA" fill-opacity="0.05"/>

  <!-- Mid-sky glitch clusters -->
  <rect x="618"  y="112" width="22" height="2" fill="#FF003C" fill-opacity="0.46"/>
  <rect x="640"  y="112" width="8"  height="2" fill="#00FFAA" fill-opacity="0.66"/>
  <rect x="618"  y="112" width="2"  height="2" fill="#fff"    fill-opacity="0.76"/>
  <rect x="1148" y="128" width="34" height="1" fill="#0055FF" fill-opacity="0.50"/>
  <rect x="1182" y="128" width="10" height="1" fill="#00FFAA" fill-opacity="0.60"/>
  <rect x="278"  y="100" width="18" height="2" fill="#00FFAA" fill-opacity="0.56"/>
  <rect x="296"  y="100" width="6"  height="2" fill="#FF003C" fill-opacity="0.60"/>

  <!-- Mint center glow -->
  <rect width="1440" height="460" fill="url(#ctMintGlow)"/>

  <!-- Scanlines -->
  <rect width="1440" height="460" fill="url(#ctScan)"/>
</svg>
