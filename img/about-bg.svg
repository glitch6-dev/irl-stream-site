  <circle cx="58"   cy="38"  r="0.8" fill="#fff" opacity="0.68"/>
  <circle cx="162"  cy="22"  r="1.0" fill="#fff" opacity="0.55"/>
  <circle cx="244"  cy="58"  r="0.6" fill="#fff" opacity="0.48"/>
  <circle cx="326"  cy="14"  r="0.9" fill="#fff" opacity="0.62"/>
  <circle cx="430"  cy="44"  r="0.7" fill="#fff" opacity="0.40"/>
  <circle cx="524"  cy="52"  r="1.1" fill="#fff" opacity="0.58"/>
  <circle cx="610"  cy="18"  r="0.8" fill="#fff" opacity="0.52"/>
  <circle cx="698"  cy="36"  r="1.0" fill="#fff" opacity="0.66"/>
  <circle cx="792"  cy="12"  r="0.6" fill="#fff" opacity="0.48"/>
  <circle cx="888"  cy="46"  r="0.9" fill="#fff" opacity="0.58"/>
  <circle cx="976"  cy="26"  r="1.1" fill="#fff" opacity="0.48"/>
  <circle cx="1064" cy="16"  r="0.7" fill="#fff" opacity="0.65"/>
  <circle cx="1148" cy="44"  r="0.9" fill="#fff" opacity="0.40"/>
  <circle cx="1232" cy="28"  r="0.8" fill="#fff" opacity="0.55"/>
  <circle cx="1322" cy="52"  r="1.0" fill="#fff" opacity="0.50"/>
  <circle cx="1406" cy="20"  r="0.7" fill="#fff" opacity="0.62"/>
  <circle cx="72"   cy="90"  r="0.6" fill="#fff" opacity="0.38"/>
  <circle cx="202"  cy="106" r="0.8" fill="#fff" opacity="0.44"/>
  <circle cx="390"  cy="74"  r="0.7" fill="#fff" opacity="0.36"/>
  <circle cx="570"  cy="94"  r="0.9" fill="#fff" opacity="0.46"/>
  <circle cx="752"  cy="66"  r="0.6" fill="#fff" opacity="0.38"/>
  <circle cx="932"  cy="84"  r="0.8" fill="#fff" opacity="0.44"/>
  <circle cx="1096" cy="68"  r="1.0" fill="#fff" opacity="0.36"/>
  <circle cx="1272" cy="88"  r="0.7" fill="#fff" opacity="0.44"/>
  <circle cx="1420" cy="76"  r="0.6" fill="#fff" opacity="0.38"/>

  <!-- Stars — Glitch Mint -->
  <circle cx="178"  cy="32"  r="1.1" fill="#00FFAA" opacity="0.82"/>
  <circle cx="464"  cy="17"  r="0.9" fill="#00FFAA" opacity="0.72"/>
  <circle cx="742"  cy="48"  r="1.3" fill="#00FFAA" opacity="0.68"/>
  <circle cx="1022" cy="30"  r="1.0" fill="#00FFAA" opacity="0.75"/>
  <circle cx="1362" cy="38"  r="1.2" fill="#00FFAA" opacity="0.65"/>
  <circle cx="838"  cy="78"  r="0.8" fill="#00FFAA" opacity="0.52"/>
  <circle cx="352"  cy="64"  r="0.9" fill="#00FFAA" opacity="0.50"/>

