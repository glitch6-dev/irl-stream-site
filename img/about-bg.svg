  <line x1="720" y1="320" x2="0"    y2="460" stroke="#00FFAA" stroke-width="0.5" opacity="0.18"/>
  <line x1="720" y1="320" x2="144"  y2="460" stroke="#00FFAA" stroke-width="0.5" opacity="0.15"/>
  <line x1="720" y1="320" x2="288"  y2="460" stroke="#00FFAA" stroke-width="0.5" opacity="0.14"/>
  <line x1="720" y1="320" x2="432"  y2="460" stroke="#00FFAA" stroke-width="0.5" opacity="0.13"/>
  <line x1="720" y1="320" x2="576"  y2="460" stroke="#00FFAA" stroke-width="0.5" opacity="0.12"/>
  <line x1="720" y1="320" x2="720"  y2="460" stroke="#00FFAA" stroke-width="0.6" opacity="0.22"/>
  <line x1="720" y1="320" x2="864"  y2="460" stroke="#00FFAA" stroke-width="0.5" opacity="0.12"/>
  <line x1="720" y1="320" x2="1008" y2="460" stroke="#00FFAA" stroke-width="0.5" opacity="0.13"/>
  <line x1="720" y1="320" x2="1152" y2="460" stroke="#00FFAA" stroke-width="0.5" opacity="0.14"/>
  <line x1="720" y1="320" x2="1296" y2="460" stroke="#00FFAA" stroke-width="0.5" opacity="0.15"/>
  <line x1="720" y1="320" x2="1440" y2="460" stroke="#00FFAA" stroke-width="0.5" opacity="0.18"/>

  <!-- Faint upward rays into sky -->
  <line x1="720" y1="320" x2="0"    y2="220" stroke="#00FFAA" stroke-width="0.3" opacity="0.06"/>
  <line x1="720" y1="320" x2="360"  y2="200" stroke="#00FFAA" stroke-width="0.3" opacity="0.05"/>
  <line x1="720" y1="320" x2="1080" y2="200" stroke="#00FFAA" stroke-width="0.3" opacity="0.05"/>
  <line x1="720" y1="320" x2="1440" y2="220" stroke="#00FFAA" stroke-width="0.3" opacity="0.06"/>

  <!-- Horizon line -->
  <line x1="0" y1="320" x2="1440" y2="320" stroke="#00FFAA" stroke-width="0.8" opacity="0.28"/>

  <!-- Horizontal grid rows on floor plane -->
  <line x1="114"  y1="352" x2="1326" y2="352" stroke="#00FFAA" stroke-width="0.4" opacity="0.12"/>
  <line x1="228"  y1="380" x2="1212" y2="380" stroke="#00FFAA" stroke-width="0.4" opacity="0.11"/>
  <line x1="342"  y1="404" x2="1098" y2="404" stroke="#00FFAA" stroke-width="0.4" opacity="0.10"/>
  <line x1="456"  y1="424" x2="984"  y2="424" stroke="#00FFAA" stroke-width="0.4" opacity="0.09"/>
  <line x1="570"  y1="442" x2="870"  y2="442" stroke="#00FFAA" stroke-width="0.4" opacity="0.08"/>

  <!-- Glitch pixel artifacts -->
  <rect x="82"   y="154" width="148" height="2" fill="#00FFAA" fill-opacity="0.40"/>
  <rect x="408"  y="152" width="72"  height="1" fill="#FF003C" fill-opacity="0.50"/>
  <rect x="702"  y="156" width="98"  height="2" fill="#0055FF" fill-opacity="0.36"/>
  <rect x="1092" y="153" width="86"  height="1" fill="#00FFAA" fill-opacity="0.46"/>
  <rect x="1288" y="158" width="58"  height="2" fill="#FF003C" fill-opacity="0.36"/>
  <rect x="200"  y="222" width="90"  height="2" fill="#FF003C" fill-opacity="0.36"/>
  <rect x="544"  y="220" width="122" height="1" fill="#00FFAA" fill-opacity="0.30"/>
  <rect x="862"  y="226" width="64"  height="2" fill="#0055FF" fill-opacity="0.40"/>
  <rect x="1198" y="219" width="100" height="1" fill="#FF003C" fill-opacity="0.34"/>

  <!-- Dead pixel anchors -->
  <rect x="82"   y="154" width="3" height="3" fill="#00FFAA" fill-opacity="0.95"/>
  <rect x="409"  y="152" width="2" height="4" fill="#FF003C" fill-opacity="1.00"/>
  <rect x="703"  y="156" width="3" height="3" fill="#fff"    fill-opacity="0.78"/>
  <rect x="1093" y="153" width="2" height="3" fill="#00FFAA" fill-opacity="1.00"/>
  <rect x="201"  y="222" width="3" height="3" fill="#FF003C" fill-opacity="0.88"/>
  <rect x="545"  y="220" width="2" height="4" fill="#00FFAA" fill-opacity="0.82"/>
  <rect x="1199" y="219" width="3" height="3" fill="#FF003C" fill-opacity="0.86"/>
  <rect x="863"  y="226" width="3" height="2" fill="#0055FF" fill-opacity="0.88"/>

  <!-- TV interference lines -->
  <rect x="0" y="138" width="1440" height="1" fill="#00FFAA" fill-opacity="0.06"/>
  <rect x="0" y="232" width="1440" height="1" fill="#FF003C" fill-opacity="0.07"/>
  <rect x="0" y="318" width="1440" height="1" fill="#0055FF" fill-opacity="0.08"/>
  <rect x="0" y="406" width="1440" height="1" fill="#00FFAA" fill-opacity="0.05"/>

  <!-- Mid-sky glitch clusters -->
  <rect x="624"  y="116" width="24" height="2" fill="#FF003C" fill-opacity="0.48"/>
  <rect x="648"  y="116" width="8"  height="2" fill="#00FFAA" fill-opacity="0.68"/>
  <rect x="624"  y="116" width="2"  height="2" fill="#fff"    fill-opacity="0.78"/>
  <rect x="1154" y="132" width="36" height="1" fill="#0055FF" fill-opacity="0.52"/>
  <rect x="1190" y="132" width="12" height="1" fill="#00FFAA" fill-opacity="0.62"/>
  <rect x="284"  y="104" width="20" height="2" fill="#00FFAA" fill-opacity="0.58"/>
  <rect x="304"  y="104" width="6"  height="2" fill="#FF003C" fill-opacity="0.62"/>

  <!-- Mint horizon glow -->
  <rect width="1440" height="460" fill="url(#abMintGlow)"/>

  <!-- Scanlines -->
  <rect width="1440" height="460" fill="url(#abScan)"/>

  <!-- Bright mint horizon line -->
  <rect x="0" y="318" width="1440" height="2" fill="#00FFAA" fill-opacity="0.20"/>
</svg>
