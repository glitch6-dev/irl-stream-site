<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 460" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="abSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#010207"/>
      <stop offset="55%"  stop-color="#030d1a"/>
      <stop offset="100%" stop-color="#050b14"/>
    </linearGradient>
    <radialGradient id="abMintGlow" cx="50%" cy="85%" r="58%">
      <stop offset="0%"   stop-color="#00FFAA" stop-opacity="0.30"/>
      <stop offset="55%"  stop-color="#00FFAA" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#00FFAA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="abRChan" cx="20%" cy="80%" r="40%">
      <stop offset="0%"   stop-color="#FF003C" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FF003C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="abBChan" cx="80%" cy="80%" r="40%">
      <stop offset="0%"   stop-color="#0055FF" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#0055FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="abScan" x="0" y="0" width="1440" height="4" patternUnits="userSpaceOnUse">
      <rect width="1440" height="1" fill="#000" fill-opacity="0.16"/>
    </pattern>
  </defs>

  <!-- Sky -->
  <rect width="1440" height="460" fill="url(#abSky)"/>

