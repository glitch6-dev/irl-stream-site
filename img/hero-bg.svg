  <!-- Red channel: shifted left 6px -->
  <path d="M-6,352 L144,304 L294,322 L444,282 L594,300 L714,270 L844,290 L994,260 L1144,280 L1294,250 L1434,270 L1434,460 L-6,460 Z"
