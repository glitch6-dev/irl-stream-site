  <!-- Glitch strip 3 — blue displacement at y=318 -->
  <g clip-path="url(#gs3)">
    <rect x="0" y="318" width="1440" height="10" fill="#0055FF" fill-opacity="0.09"/>
    <path d="M0,352 L150,304 L300,322 L450,282 L600,300 L720,270 L850,290 L1000,260 L1150,280 L1300,250 L1440,270 L1440,460 L0,460 Z"
