<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 460" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#010207"/>
      <stop offset="50%"  stop-color="#030d1a"/>
      <stop offset="100%" stop-color="#060c18"/>
    </linearGradient>
    <radialGradient id="mintGlow" cx="50%" cy="100%" r="62%">
      <stop offset="0%"   stop-color="#00FFAA" stop-opacity="0.38"/>
      <stop offset="55%"  stop-color="#00FFAA" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#00FFAA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rChan" cx="28%" cy="90%" r="44%">
      <stop offset="0%"   stop-color="#FF003C" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF003C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bChan" cx="74%" cy="86%" r="40%">
      <stop offset="0%"   stop-color="#0055FF" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#0055FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="scan" x="0" y="0" width="1440" height="4" patternUnits="userSpaceOnUse">
      <rect width="1440" height="1" fill="#000" fill-opacity="0.18"/>
    </pattern>
    <!-- Glitch strip clip regions — horizontal slices for displacement effect -->
    <clipPath id="gs1"><rect x="0" y="182" width="1440" height="8"/></clipPath>
    <clipPath id="gs2"><rect x="0" y="248" width="1440" height="6"/></clipPath>
    <clipPath id="gs3"><rect x="0" y="318" width="1440" height="10"/></clipPath>
    <clipPath id="gs4"><rect x="0" y="390" width="1440" height="5"/></clipPath>
  </defs>

  <!-- Sky -->
  <rect width="1440" height="460" fill="url(#sky)"/>

  <!-- Stars — white -->
  <circle cx="68"  cy="42"  r="0.8" fill="#fff" opacity="0.70"/>
  <circle cx="145" cy="26"  r="1.1" fill="#fff" opacity="0.60"/>
  <circle cx="228" cy="60"  r="0.6" fill="#fff" opacity="0.50"/>
  <circle cx="312" cy="16"  r="0.9" fill="#fff" opacity="0.65"/>
  <circle cx="418" cy="33"  r="0.7" fill="#fff" opacity="0.40"/>
  <circle cx="510" cy="54"  r="1.2" fill="#fff" opacity="0.60"/>
  <circle cx="598" cy="20"  r="0.8" fill="#fff" opacity="0.55"/>
  <circle cx="682" cy="38"  r="1.0" fill="#fff" opacity="0.70"/>
  <circle cx="778" cy="14"  r="0.6" fill="#fff" opacity="0.50"/>
  <circle cx="876" cy="48"  r="0.9" fill="#fff" opacity="0.60"/>
  <circle cx="962" cy="28"  r="1.1" fill="#fff" opacity="0.50"/>
  <circle cx="1048" cy="18" r="0.7" fill="#fff" opacity="0.68"/>
  <circle cx="1132" cy="46" r="0.9" fill="#fff" opacity="0.42"/>
  <circle cx="1218" cy="30" r="0.8" fill="#fff" opacity="0.58"/>
  <circle cx="1308" cy="55" r="1.0" fill="#fff" opacity="0.52"/>
  <circle cx="1392" cy="22" r="0.7" fill="#fff" opacity="0.65"/>
  <circle cx="52"  cy="88"  r="0.6" fill="#fff" opacity="0.40"/>
  <circle cx="188" cy="104" r="0.8" fill="#fff" opacity="0.45"/>
  <circle cx="378" cy="76"  r="0.7" fill="#fff" opacity="0.38"/>
  <circle cx="558" cy="92"  r="0.9" fill="#fff" opacity="0.48"/>
  <circle cx="740" cy="68"  r="0.6" fill="#fff" opacity="0.40"/>
  <circle cx="918" cy="86"  r="0.8" fill="#fff" opacity="0.46"/>
  <circle cx="1082" cy="70" r="1.0" fill="#fff" opacity="0.38"/>
  <circle cx="1258" cy="90" r="0.7" fill="#fff" opacity="0.46"/>
  <circle cx="1412" cy="78" r="0.6" fill="#fff" opacity="0.40"/>

