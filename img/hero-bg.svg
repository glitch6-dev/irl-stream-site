  <!-- Blue channel: shifted right 6px -->
  <path d="M6,352 L156,304 L306,322 L456,282 L606,300 L726,270 L856,290 L1006,260 L1156,280 L1306,250 L1446,270 L1446,460 L6,460 Z"
