  <rect width="1440" height="460" fill="url(#bChan)"/>

  <!-- ─── FAR MOUNTAINS — RGB SPLIT ─── -->
  <!-- Red channel: shifted left 8px -->
  <path d="M-8,290 L92,242 L192,260 L342,214 L492,232 L642,202 L792,220 L942,192 L1092,210 L1242,180 L1342,200 L1432,190 L1432,460 L-8,460 Z"
        fill="#FF003C" opacity="0.32"/>
  <!-- Blue channel: shifted right 8px -->
  <path d="M8,290 L108,242 L208,260 L358,214 L508,232 L658,202 L808,220 L958,192 L1108,210 L1258,180 L1358,200 L1448,190 L1448,460 L8,460 Z"
        fill="#0055FF" opacity="0.28"/>
  <!-- Main far mountains -->
  <path d="M0,290 L100,242 L200,260 L350,214 L500,232 L650,202 L800,220 L950,192 L1100,210 L1250,180 L1350,200 L1440,190 L1440,460 L0,460 Z"
        fill="#0b1820"/>
  <!-- Mint ridge trace -->
  <path d="M0,290 L100,242 L200,260 L350,214 L500,232 L650,202 L800,220 L950,192 L1100,210 L1250,180 L1350,200 L1440,190"
        fill="none" stroke="#00FFAA" stroke-width="0.7" opacity="0.22"/>

