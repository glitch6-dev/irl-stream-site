  <!-- Glitch strip 4 — mint displacement at foothills -->
  <g clip-path="url(#gs4)">
    <rect x="0" y="390" width="1440" height="5" fill="#00FFAA" fill-opacity="0.05"/>
    <path d="M0,418 L200,400 L380,412 L560,394 L740,408 L920,392 L1100,404 L1300,390 L1440,400 L1440,460 L0,460 Z"
          fill="#00FFAA" opacity="0.22" transform="translate(-12,0)"/>
  </g>

  <!-- ─── PIXEL ARTIFACT NOISE (glitch data corruption) ─── -->
  <!-- Long colored strips simulating corrupt scan lines in the sky -->
  <rect x="78"   y="158" width="140" height="2" fill="#00FFAA" fill-opacity="0.42"/>
  <rect x="398"  y="156" width="68"  height="1" fill="#FF003C" fill-opacity="0.52"/>
  <rect x="692"  y="160" width="95"  height="2" fill="#0055FF" fill-opacity="0.38"/>
  <rect x="1088" y="157" width="82"  height="1" fill="#00FFAA" fill-opacity="0.48"/>
  <rect x="1278" y="161" width="55"  height="2" fill="#FF003C" fill-opacity="0.38"/>

  <rect x="195"  y="228" width="88"  height="2" fill="#FF003C" fill-opacity="0.38"/>
  <rect x="535"  y="226" width="118" height="1" fill="#00FFAA" fill-opacity="0.32"/>
  <rect x="855"  y="230" width="62"  height="2" fill="#0055FF" fill-opacity="0.42"/>
  <rect x="1192" y="225" width="98"  height="1" fill="#FF003C" fill-opacity="0.36"/>

  <rect x="345"  y="288" width="78"  height="2" fill="#00FFAA" fill-opacity="0.28"/>
  <rect x="752"  y="286" width="108" height="1" fill="#FF003C" fill-opacity="0.32"/>
  <rect x="1042" y="290" width="72"  height="2" fill="#0055FF" fill-opacity="0.30"/>

  <!-- Bright "dead pixel" anchors at artifact start points -->
  <rect x="78"   y="158" width="3" height="3" fill="#00FFAA" fill-opacity="0.95"/>
  <rect x="399"  y="156" width="2" height="4" fill="#FF003C" fill-opacity="1.00"/>
  <rect x="693"  y="160" width="3" height="3" fill="#fff"    fill-opacity="0.80"/>
  <rect x="1089" y="157" width="2" height="3" fill="#00FFAA" fill-opacity="1.00"/>
  <rect x="196"  y="228" width="3" height="3" fill="#FF003C" fill-opacity="0.90"/>
  <rect x="536"  y="226" width="2" height="4" fill="#00FFAA" fill-opacity="0.85"/>
  <rect x="1193" y="225" width="3" height="3" fill="#FF003C" fill-opacity="0.88"/>
  <rect x="346"  y="288" width="2" height="3" fill="#00FFAA" fill-opacity="1.00"/>
  <rect x="856"  y="230" width="3" height="2" fill="#0055FF" fill-opacity="0.90"/>

  <!-- Full-width ultra-thin channel lines (the "TV interference" look) -->
  <rect x="0" y="140" width="1440" height="1" fill="#00FFAA" fill-opacity="0.07"/>
  <rect x="0" y="236" width="1440" height="1" fill="#FF003C" fill-opacity="0.08"/>
  <rect x="0" y="324" width="1440" height="1" fill="#0055FF" fill-opacity="0.09"/>
  <rect x="0" y="408" width="1440" height="1" fill="#00FFAA" fill-opacity="0.06"/>

  <!-- Additional mid-sky glitch artifact clusters -->
  <rect x="620"  y="120" width="22" height="2" fill="#FF003C" fill-opacity="0.50"/>
  <rect x="642"  y="120" width="8"  height="2" fill="#00FFAA" fill-opacity="0.70"/>
  <rect x="620"  y="120" width="2"  height="2" fill="#fff"    fill-opacity="0.80"/>

  <rect x="1150" y="135" width="35" height="1" fill="#0055FF" fill-opacity="0.55"/>
  <rect x="1185" y="135" width="12" height="1" fill="#00FFAA" fill-opacity="0.65"/>
  <rect x="1150" y="135" width="2"  height="2" fill="#fff"    fill-opacity="0.75"/>

  <rect x="280"  y="108" width="18" height="2" fill="#00FFAA" fill-opacity="0.60"/>
  <rect x="298"  y="108" width="6"  height="2" fill="#FF003C" fill-opacity="0.65"/>

  <!-- Mint horizon glow -->
  <rect width="1440" height="460" fill="url(#mintGlow)"/>

  <!-- Scanlines (CRT vibe) -->
  <rect width="1440" height="460" fill="url(#scan)"/>

  <!-- Bright mint horizon line just above mid-mountain ridge -->
  <rect x="0" y="268" width="1440" height="2" fill="#00FFAA" fill-opacity="0.18"/>
</svg>
