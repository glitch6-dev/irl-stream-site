  <circle cx="165" cy="36"  r="1.1" fill="#00FFAA" opacity="0.85"/>
  <circle cx="452" cy="19"  r="0.9" fill="#00FFAA" opacity="0.75"/>
  <circle cx="728" cy="50"  r="1.3" fill="#00FFAA" opacity="0.70"/>
  <circle cx="1008" cy="33" r="1.0" fill="#00FFAA" opacity="0.78"/>
  <circle cx="1348" cy="40" r="1.2" fill="#00FFAA" opacity="0.68"/>
  <circle cx="824" cy="80"  r="0.8" fill="#00FFAA" opacity="0.55"/>
